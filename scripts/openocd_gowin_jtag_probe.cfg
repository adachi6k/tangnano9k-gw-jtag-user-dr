# OpenOCD configuration for Tang Nano 9K GW_JTAG USER DR probing.
#
# By default this tries the built-in SIPEED FTDI interface config when
# available, then falls back to a direct FT2232 setup.

if {[info exists ::env(OPENOCD_IFACE_CFG)] && ($::env(OPENOCD_IFACE_CFG) ne "")} {
    source $::env(OPENOCD_IFACE_CFG)
} elseif {![catch {find interface/ftdi/sipeed-rv-debugger.cfg} if_cfg]} {
    source $if_cfg
} else {
    adapter driver ftdi
    ftdi vid_pid 0x0403 0x6010
    ftdi channel 0
    ftdi layout_init 0x0808 0x0a1b
}

transport select jtag

if {[info exists ::env(OPENOCD_ADAPTER_SPEED_KHZ)] && ($::env(OPENOCD_ADAPTER_SPEED_KHZ) ne "")} {
    adapter speed $::env(OPENOCD_ADAPTER_SPEED_KHZ)
} else {
    adapter speed 1000
}

if {[info exists ::env(OPENOCD_EXPECTED_IDCODE)] && ($::env(OPENOCD_EXPECTED_IDCODE) ne "")} {
    set fpga_expected_id $::env(OPENOCD_EXPECTED_IDCODE)
    jtag newtap gowin fpga -irlen 8 -expected-id $fpga_expected_id
} else {
    jtag newtap gowin fpga -irlen 8
}
